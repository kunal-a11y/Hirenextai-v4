kind = "web"
previewPath = "/"
title = "HirenextAI"
version = "1.0.0"
id = "artifacts/hirenextai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19996
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/hirenextai run dev"

[services.env]
PORT = "19996"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/hirenextai", "run", "build"]
publicDir = "artifacts/hirenextai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
